<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="{{ wrapStyle }}" title="{{ title }}">
  <sc-if value="{{ shapeIs.check }}" hint-placeholder-val="{{ true }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M20 6 9 17l-5-5"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.question }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"></path><path d="M12 17h.01"></path><circle cx="12" cy="12" r="9.5" opacity=".45"></circle></svg></sc-if>
  <sc-if value="{{ shapeIs.duplicate }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.unlink }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="m19 5-4 4"></path><path d="m5 19 4-4"></path><path d="M10.5 6.5 12 5a3.5 3.5 0 0 1 5 5l-1.5 1.5"></path><path d="M13.5 17.5 12 19a3.5 3.5 0 0 1-5-5l1.5-1.5"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.orphan }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.clock }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><circle cx="12" cy="12" r="9.2"></circle><path d="M12 7v5l3.2 2"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.dispatch }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M7 17 17 7"></path><path d="M8 7h9v9"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.human }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><circle cx="12" cy="8" r="3.4"></circle><path d="M5.5 20a6.5 6.5 0 0 1 13 0"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.cancel }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><circle cx="12" cy="12" r="9.2"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.stop }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M8.6 2.6h6.8L21.4 8.6v6.8L15.4 21.4H8.6L2.6 15.4V8.6Z"></path><path d="M15 9 9 15"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.query }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.2-3.2"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.restart }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"></path><path d="M3 3v5h5"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.lock }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><rect x="4.5" y="10.5" width="15" height="10" rx="2"></rect><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"></path></svg></sc-if>
  <sc-if value="{{ shapeIs.dot }}"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="flex:none"><circle cx="12" cy="12" r="4.5"></circle></svg></sc-if>
  <span style="{{ labelStyle }}">{{ label }}</span>
</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:180,&quot;height&quot;:48},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;green&quot;,&quot;amber&quot;,&quot;red&quot;,&quot;violet&quot;,&quot;cyan&quot;,&quot;blue&quot;,&quot;neutral&quot;],&quot;default&quot;:&quot;amber&quot;,&quot;tsType&quot;:&quot;'green'|'amber'|'red'|'violet'|'cyan'|'blue'|'neutral'&quot;},&quot;shape&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;check&quot;,&quot;question&quot;,&quot;duplicate&quot;,&quot;unlink&quot;,&quot;orphan&quot;,&quot;clock&quot;,&quot;dispatch&quot;,&quot;human&quot;,&quot;cancel&quot;,&quot;stop&quot;,&quot;query&quot;,&quot;restart&quot;,&quot;lock&quot;,&quot;dot&quot;],&quot;default&quot;:&quot;question&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;AMBIGUOUS&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sm&quot;,&quot;md&quot;],&quot;default&quot;:&quot;md&quot;,&quot;tsType&quot;:&quot;'sm'|'md'&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const tone = this.props.tone || 'neutral';
    const shape = this.props.shape || 'dot';
    const sm = this.props.size === 'sm';
    const map = {
      green:  ['var(--st-green)','var(--st-green-bg)'],
      amber:  ['var(--st-amber)','var(--st-amber-bg)'],
      red:    ['var(--st-red)','var(--st-red-bg)'],
      violet: ['var(--st-violet)','var(--st-violet-bg)'],
      cyan:   ['var(--st-cyan)','var(--st-cyan-bg)'],
      blue:   ['var(--st-blue)','var(--st-blue-bg)'],
      neutral:['var(--st-neutral)','var(--st-neutral-bg)'],
    };
    const [fg, bg] = map[tone] || map.neutral;
    const shapes = ['check','question','duplicate','unlink','orphan','clock','dispatch','human','cancel','stop','query','restart','lock','dot'];
    const shapeIs = {};
    shapes.forEach(s => shapeIs[s] = (s === shape));
    return {
      label: this.props.label || '',
      title: this.props.title || this.props.label || '',
      shapeIs,
      wrapStyle: {
        display:'inline-flex', alignItems:'center', gap: sm ? '4px' : '5px',
        padding: sm ? '1px 7px 1px 5px' : '2.5px 9px 2.5px 6px',
        borderRadius:'6px', background: bg, color: fg,
        fontFamily:'var(--mono)', lineHeight:1, whiteSpace:'nowrap',
        boxShadow:'inset 0 0 0 1px color-mix(in oklab, '+fg+' 22%, transparent)'
      },
      labelStyle: {
        fontSize: sm ? '10px' : '10.5px', fontWeight:600,
        letterSpacing:'.045em', fontFamily:'var(--mono)'
      }
    };
  }
}
</script>
</body>
</html>
