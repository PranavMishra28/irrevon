<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open Graph card">
  <!-- OG social card template (N4 identity spec, original composition of the
       E1 mark + the One-Way Seat sequence strip; hexes are the ratified
       Instrument Steel light-theme values). {{PRODUCT_NAME}} /
       {{HEADLINE_LINE_1}} / {{HEADLINE_LINE_2}} are template slots filled by
       scripts/build-og.mjs; the rendered PNGs are committed and
       drift-checked. Provenance: site/ASSETS.md. -->
  <rect width="1200" height="630" fill="#FAFAFB"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#D2D4D7" stroke-width="1"/>
  <!-- mark + name slot -->
  <g transform="translate(72,64) scale(3.5)" fill="#1D2229">
    <path d="M2.5 12 H6 L12 18 L18 12 H21.5 V20.5 H2.5 Z"/>
    <circle cx="12" cy="10.93" r="5"/>
    <path fill="none" stroke="#1D2229" stroke-width="2.4" d="M4.1 3 L7.6 6.5"/>
    <path fill="none" stroke="#1D2229" stroke-width="2.4" d="M19.9 3 L16.4 6.5"/>
  </g>
  <text x="182" y="122" font-family="IBM Plex Sans" font-weight="600" font-size="44"
        letter-spacing="-0.5" fill="#1D2229">{{PRODUCT_NAME}}</text>
  <!-- headline slot: two lines max, 64px -->
  <text x="72" y="300" font-family="IBM Plex Sans" font-weight="600" font-size="64"
        letter-spacing="-1.2" fill="#1D2229">{{HEADLINE_LINE_1}}</text>
  <text x="72" y="376" font-family="IBM Plex Sans" font-weight="600" font-size="64"
        letter-spacing="-1.2" fill="#1D2229">{{HEADLINE_LINE_2}}</text>
  <!-- sequence strip: chip ’ gate ’ boundary(pawl+port) ’ seated ball + returning evidence -->
  <g transform="translate(72,462)" stroke="#1D2229" fill="none" stroke-width="2.5">
    <rect x="0" y="18" width="96" height="54" rx="3"/>
    <line x1="14" y1="36" x2="72" y2="36"/><line x1="14" y1="50" x2="56" y2="50"/>
    <line x1="96" y1="45" x2="150" y2="45"/>
    <path d="M186 9 L222 45 L186 81 L150 45 Z"/><path d="M172 43 l7 7 12-14"/>
    <line x1="222" y1="45" x2="330" y2="45" stroke-dasharray="7 6"/>
    <line x1="336" y1="0" x2="336" y2="20"/><line x1="336" y1="52" x2="336" y2="92"/>
    <path d="M344 30 L332 37 M344 44 L332 37" stroke-width="2"/>
    <path d="M339 56 L361 45 L355 68 Z" fill="#1D2229" stroke="none"/>
    <line x1="342" y1="45" x2="452" y2="45" stroke-width="3.5"/>
    <path d="M458 45 H492 L530 83 H531 L568 45 H602 V92 H458 Z"/>
    <circle cx="530" cy="56" r="19" fill="#1D2229" stroke="none"/>
    <line x1="600" y1="14" x2="120" y2="14" stroke-width="2" marker-end="url(#ogarr)"/>
  </g>
  <text x="72" y="586" font-family="IBM Plex Mono" font-size="20" letter-spacing="1"
        fill="#5A6069">{{FOOTER}}</text>
  <defs><marker id="ogarr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8"
      orient="auto-start-reverse"><path d="M0 0 L8 4 L0 8" fill="none" stroke="#1D2229"
      stroke-width="1.6"/></marker></defs>
</svg>
