# Detent — Dependabot: keeps action SHA pins fresh (it updates the pinned SHA and
# the trailing version comment together). The 7-day cooldown is the tag-hijack
# shield: action compromises have historically been detected within days, and
# security updates bypass cooldown by design.
# Owner prerequisite (Settings -> Advanced Security): Dependabot alerts +
# security updates ON — see docs/ci.md.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    groups:
      actions-all:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  # Backend (Python/uv per ADR-0013) — activated at consolidation when uv.lock landed.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 5
      semver-major-days: 30
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5

  # Frontend (pnpm via the npm ecosystem) — activated at consolidation when
  # web/pnpm-lock.yaml landed. pnpm-workspace.yaml's 7-day minimumReleaseAge
  # remains the stronger release-age gate at install time.
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 5
      semver-major-days: 30
    groups:
      web-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
