# Irrevon dependency policy: one monthly routine pull request across every
# supported ecosystem, plus prompt per-ecosystem security remediation.
#
# GitHub does not combine security updates across ecosystems. Each update entry
# therefore keeps an explicit security group while routine version updates join
# `monthly-routine`. No auto-merge is configured. Frontend/site majors are
# intentionally excluded from routine automation and reviewed quarterly.
#
# Owner prerequisite (Settings -> Advanced Security): Dependabot alerts,
# security updates, and repository-level grouped security updates ON.
version: 2

multi-ecosystem-groups:
  monthly-routine:
    schedule:
      interval: "monthly"
    assignees:
      - "PranavMishra28"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "monthly-routine"
    cooldown:
      default-days: 7
    groups:
      actions-security:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"
    labels:
      - "dependencies"

  # Backend (Python/uv per ADR-0013). Majors retain a longer cooldown; every
  # routine version remains part of the one cross-ecosystem monthly PR.
  - package-ecosystem: "uv"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "monthly-routine"
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      python-security:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"
    labels:
      - "dependencies"

  # Exact-pinned Workbench stack. Major upgrades are a quarterly, manual
  # compatibility exercise; security updates are never suppressed by this
  # version-update-only ignore rule.
  - package-ecosystem: "npm"
    directory: "/web"
    patterns: ["*"]
    multi-ecosystem-group: "monthly-routine"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      web-security:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"
    labels:
      - "dependencies"

  # Runtime/reproducibility container digests remain authoritative. Dependabot
  # proposes reviewed digest refreshes without allowing mutable runtime tags.
  - package-ecosystem: "docker"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "monthly-routine"
    cooldown:
      default-days: 7
    groups:
      containers-security:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"
    labels:
      - "dependencies"

  # Exact-pinned marketing/docs stack, with the same routine-major boundary as
  # the Workbench and its own prompt security-remediation group.
  - package-ecosystem: "npm"
    directory: "/site"
    patterns: ["*"]
    multi-ecosystem-group: "monthly-routine"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      site-security:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"
    labels:
      - "dependencies"
