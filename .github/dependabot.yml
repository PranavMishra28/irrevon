# Irrevon — Dependabot: noise-contained configuration (rationale: docs/ci.md workflow map, dependabot row).
# Target steady state: at most one grouped version PR per configured lane per month (≤4/month),
# plus rare security PRs (which bypass schedule and cooldown by design).
# github-actions cooldown is the tag-hijack shield: action compromises have historically
# been detected within days, and security updates bypass cooldown by design.
# Owner prerequisite (Settings -> Advanced Security): Dependabot alerts +
# security updates ON — see docs/ci.md.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      actions-all:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"

  # Backend (Python/uv per ADR-0013). Single rolled-up PR covering all update types;
  # majors are slowed (not blocked) by the 30-day major cooldown — pyproject uses
  # ranged requirements, so majors are lower-risk than in the exact-pinned frontend.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      python-all:
        patterns: ["*"]
      python-security:
        applies-to: security-updates
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"

  # Frontend (pnpm via the npm ecosystem). Exact-pinned stack per ADR-0016: major
  # bumps are ignored here and arrive only via deliberate, human-scheduled upgrades.
  # cooldown default-days: 7 is deliberately aligned with pnpm-workspace.yaml's
  # minimumReleaseAge: 10080 (7 days) so Dependabot never proposes a version too
  # young for pnpm to install (see rationale §5).
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      web-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      web-security:
        applies-to: security-updates
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"

  # Runtime/reproducibility containers. Digests stay authoritative; Dependabot
  # proposes reviewed digest refreshes rather than allowing mutable tags.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      containers-all:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"

  # Marketing/docs site (pnpm via the npm ecosystem). This is an independent
  # package.json + pnpm-lock.yaml tree, so it needs its own update lane. Match
  # the exact-pinned frontend posture: human-reviewed majors, grouped minor/
  # patch versions, grouped security updates, and the 7-day release-age gate.
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      site-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      site-security:
        applies-to: security-updates
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 1
    assignees:
      - "PranavMishra28"
