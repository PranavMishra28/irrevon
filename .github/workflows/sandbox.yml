# Irrevon sandbox suite (T4) — FAIL-CLOSED SKELETON. Every manual dispatch
# reaches one unconditional refusal and therefore finishes red. M4 activation
# is a separate human-reviewed task after Stage A, ADR-0010 and ADR-0012,
# applicable terms review, and a real credentialed contract recipe are complete.
#
# Boundary design (public-repo model): this job references the `sandbox`
# environment so a future active suite remains approval-gated. The owner must
# create and protect that environment before any dispatch; referencing a
# nonexistent environment can auto-create it without protection. This dormant
# skeleton deliberately reads no credential and names no future secret.
name: sandbox

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this refusal was dispatched (recorded in the run log)"
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: sandbox
  cancel-in-progress: false

jobs:
  sandbox-contract:
    name: Sandbox contract suite (M4 fail-closed skeleton)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: sandbox
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # This is the entire executable body today. An input, configured
      # credential, or checked-in file cannot bypass the unconditional Make
      # refusal. Activation must replace the recipe and the static contract in
      # one human-reviewed change.
      - name: Refuse until human M4 activation
        run: make sandbox-stage-m4

      # Future M4 body (design context only; not executable):
      #   - bootstrap pinned tools without caching
      #   - guard the human-selected environment credentials
      #   - run the reviewed contract recipe against the ratified sandboxes
      #   - sanitize evidence and verify cleanup/residual effects
      # The activation task must preserve manual dispatch, environment approval,
      # least privilege, queued runs, and fail-closed error classification.
