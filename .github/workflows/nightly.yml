# Irrevon nightly — scheduled validation suite. Map: docs/ci.md.
#
# The full local gate on a clean machine PLUS the online variants the
# deterministic PR gate deliberately excludes — external link audit (lychee
# without --offline) and networked zizmor advisories.
#
# T3 tier (M3 landed; grown at the rebuild consolidation, never at the expense
# of the PR gate):
#   - t3-backend: the property suites at the conformance profile (the >=1,000
#     cases/invariant CI floor is spec and never the ceiling here) plus the
#     full integration suite — incl. the fault-matrix/process tests vs the
#     STUB destination — against the digest-pinned compose Postgres.
#   - wheel-smoke: `make dist-smoke` — the ADR-0018 no-Node guarantee chain
#     (wheel + sdist installed and exercised inside python:3.13-slim).
#     Nightly, not PR: it needs docker + a full web build + wheel build on
#     top of the PR gate's already-run builds, and the PR-side integration
#     truth is covered by the web-e2e-live job (docs/ci.md tier table).
#   Future T3 growth: randomized kill sweep / recovery-idempotence sweeps per
#   the testing design.
#   No sandbox credentials are used or available to this workflow, ever.
#
# OWNER AWARENESS (public-repo behavior): scheduled workflows are AUTO-DISABLED
# after 60 days without repository activity. The quarterly sweep checklist item
# in docs/ci.md includes "confirm nightly is still enabled"
# (Actions tab -> nightly -> banner).
name: nightly

on:
  schedule:
    - cron: "17 9 * * *" # off the top of the hour to dodge scheduler congestion
  workflow_dispatch: {} # manual re-run for debugging a red night

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  validate:
    name: Nightly validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned tools (checksum-verified)
        run: bash scripts/bootstrap-tools.sh
      - name: make check (full local gate, clean machine)
        run: make check
      - name: External link audit (online variant of make links)
        env:
          # lychee uses the read-only token for github.com URLs to avoid rate limits
          GITHUB_TOKEN: ${{ github.token }}
        run: make links-online
      - name: zizmor (online, pedantic)
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --persona=pedantic .github/workflows/

  # T3 backend: conformance-budget properties + the full integration suite
  # (fault-matrix/process tests vs the stub destination, compose Postgres).
  t3-backend:
    name: T3 backend (conformance properties + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: make py-test (conformance profile)
        run: make py-test
        env:
          HYPOTHESIS_PROFILE: conformance
      - name: make py-test-integration
        run: make py-test-integration
        env:
          HYPOTHESIS_PROFILE: conformance

  # Wheel/sdist smoke — the ADR-0018 no-Node chain in a Node-less container
  # (see the header for the nightly-not-PR placement ruling).
  wheel-smoke:
    name: Wheel smoke (make dist-smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: web/.nvmrc
      - run: corepack enable
      - run: make dist-smoke

  # A red night on a cron workflow is silent by default; this files or updates
  # exactly ONE issue, deduplicated by a fixed title. Uses only trusted workflow
  # context — no event text and no repository-label prerequisite.
  report-failure:
    name: File or update failure issue
    needs: [validate, t3-backend, wheel-smoke]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # checkout for the template file
      issues: write # create/comment on the failure issue
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: File or update the nightly failure issue (dedup by fixed title)
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          RUN_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          ISSUE_TITLE="Nightly validation failure"
          existing=$(gh issue list --state open --search "\"${ISSUE_TITLE}\" in:title" \
            --json number,title \
            --jq 'map(select(.title == "Nightly validation failure")) | .[0].number // empty')
          # Strip the issue-template frontmatter, then fill placeholders from
          # trusted workflow context only.
          body=$(awk 'BEGIN{fm=0} NR==1 && /^---$/{fm=1; next} fm==1 && /^---$/{fm=2; next} fm!=1{print}' \
                   .github/ISSUE_TEMPLATE/nightly-failure.md \
                 | sed -e "s|{{RUN_URL}}|${RUN_URL}|g" \
                       -e "s|{{RUN_DATE}}|${RUN_DATE}|g" \
                       -e "s|{{SHA}}|${SHA}|g")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$body"
          fi
