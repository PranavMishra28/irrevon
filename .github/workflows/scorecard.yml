name: openssf-scorecard

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "17 5 * * 3"

permissions: {}

concurrency:
  group: openssf-scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # upload Scorecard SARIF to code scanning
      id-token: write # publish signed Scorecard results
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@adfda868f108ac4222129de456ea554034a27db7 # v4
        with:
          sarif_file: results.sarif
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openssf-scorecard-results
          path: results.sarif
          if-no-files-found: error
          retention-days: 5
