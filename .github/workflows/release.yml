# Release preparation is executable but publishing is human-gated. Pull
# requests and manual dispatches run only `dry-run`; only an owner-pushed
# version tag in the canonical repository can reach the protected `release`
# environment and its PyPI/GitHub publication steps.
name: release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "pyproject.toml"
      - "hatch_build.py"
      - "PACKAGE_README.md"
      - "README.md"
      - "CHANGELOG.md"
      - "CITATION.cff"
      - "LICENSE"
      - "NOTICE"
      - "THIRD-PARTY-NOTICES.md"
      - "THIRD-PARTY-LICENSES.md"
      - "ASSETS.md"
      - "src/**"
      - "web/**"
      - "migrations/**"
      - "schemas/**"
      - "scripts/**"
      - "Makefile"
      - "uv.lock"
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    name: Non-publishing release dry run
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.12"
          enable-cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: web/.nvmrc
          package-manager-cache: false
      - run: corepack enable
      - name: Install checksum-pinned binaries and locked Python validators
        env:
          IRREVON_LOCKED_RELEASE_VALIDATION: "1"
        run: bash scripts/bootstrap-tools.sh
      - name: Validate source and build release candidates
        env:
          # A final-version candidate is validated on PR/manual runs, but this
          # script has no upload path and the job has no publishing permission.
          IRREVON_ALLOW_RELEASE_VERSION: "1"
        run: |
          set -euo pipefail
          uv run --locked --group release-validation make check py-check py-test
          make release-dry-run
          test -z "$(git status --porcelain --untracked-files=no)"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: irrevon-release-dry-run
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/irrevon.spdx.json
          if-no-files-found: error
          retention-days: 7

  validate-build:
    name: Validate and build tagged artifacts
    if: >-
      github.ref_type == 'tag' &&
      github.event_name == 'push' &&
      github.repository == 'PranavMishra28/irrevon' &&
      github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.12"
          enable-cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: web/.nvmrc
          package-manager-cache: false
      - run: corepack enable
      - name: Install checksum-pinned binaries and locked Python validators
        env:
          IRREVON_LOCKED_RELEASE_VALIDATION: "1"
        run: bash scripts/bootstrap-tools.sh
      - name: Refuse a mismatched or dirty tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain)"
          [[ "$TAG_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || {
            echo "::error::tag is not exactly vMAJOR.MINOR.PATCH"
            exit 1
          }
          test "$(git cat-file -t "refs/tags/$TAG_NAME")" = tag || {
            echo "::error::release tags must be annotated, not lightweight"
            exit 1
          }
          tagged_commit=$(git rev-parse "$TAG_NAME^{}")
          reviewed_main=$(git rev-parse origin/main)
          checked_out_commit=$(git rev-parse HEAD)
          test "$checked_out_commit" = "$tagged_commit" &&
            test "$checked_out_commit" = "$reviewed_main" || {
            echo "::error::HEAD, annotated tag, and current origin/main must be identical"
            exit 1
          }
          package_version=$(uv run --locked python -c 'import irrevon; print(irrevon.__version__)')
          test "v$package_version" = "$TAG_NAME" || {
            echo "::error::tag $TAG_NAME does not match package $package_version"
            exit 1
          }
          case "$package_version" in
            *dev*|*+*) echo "::error::development/local versions cannot publish"; exit 1 ;;
          esac
      - name: Complete launch validation and release build
        env:
          IRREVON_ALLOW_RELEASE_VERSION: "1"
        run: |
          set -euo pipefail
          uv run --locked --group release-validation make launch-audit
          test -z "$(git status --porcelain --untracked-files=no)"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: irrevon-release-${{ github.ref_name }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/irrevon.spdx.json
          if-no-files-found: error
          retention-days: 7

  build-attest:
    name: Attest validated tagged artifacts
    needs: validate-build
    if: >-
      github.ref_type == 'tag' &&
      github.event_name == 'push' &&
      github.repository == 'PranavMishra28/irrevon' &&
      github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # required by GitHub artifact attestations
      id-token: write # sign the artifact attestation with GitHub OIDC
      attestations: write # publish provenance for the validated artifacts
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: irrevon-release-${{ github.ref_name }}
          path: dist
      - name: Attest wheel, sdist, checksums, and SBOM
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/irrevon.spdx.json

  publish-pypi:
    name: Protected PyPI publication
    needs: build-attest
    if: >-
      github.ref_type == 'tag' &&
      github.event_name == 'push' &&
      github.repository == 'PranavMishra28/irrevon' &&
      github.actor == github.repository_owner
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # PyPI Trusted Publishing exchanges this OIDC token
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: irrevon-release-${{ github.ref_name }}
          path: dist
      - name: Verify downloaded artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum --check SHA256SUMS
          test "$(find . -maxdepth 1 -name '*.whl' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -name '*.tar.gz' | wc -l)" -eq 1
          python -m json.tool irrevon.spdx.json >/dev/null
          mkdir ../packages
          cp ./*.whl ./*.tar.gz ../packages/
      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: packages

  publish-github:
    name: Protected GitHub release
    needs: [build-attest, publish-pypi]
    if: >-
      github.ref_type == 'tag' &&
      github.event_name == 'push' &&
      github.repository == 'PranavMishra28/irrevon' &&
      github.actor == github.repository_owner
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the GitHub release and upload its artifacts
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: irrevon-release-${{ github.ref_name }}
          path: dist
      - name: Verify and create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum --check SHA256SUMS
          cd ..
          gh release create "$TAG_NAME" \
            dist/*.whl dist/*.tar.gz dist/SHA256SUMS dist/irrevon.spdx.json \
            --verify-tag --generate-notes --title "Irrevon $TAG_NAME"
