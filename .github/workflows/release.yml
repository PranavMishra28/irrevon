# Irrevon release pipeline — PREPARED BUT DISABLED. The only job is a hard-stop
# guard (`if: false`); the real pipeline lives below as a structured comment so
# it can be reviewed and adopted deliberately, not triggered accidentally.
#
# GATES THAT MUST CLOSE BEFORE THIS IS ENABLED (all human-only):
#   1. The execution-plan public-release gate (docs/execution-plan.md) — release
#      artifacts ship from the sanitized public repository that gate creates.
#   2. Master doc section 13 blockers: external clearances granted in writing, name
#      screen, preregistration stamping.
#   3. ADR-0013 ratified (packaging path below assumes Python/uv; adjust if not).
#   4. Owner one-time setup on the release repo: immutable releases enabled;
#      PyPI Trusted Publisher configured; `release` environment with required
#      reviewer; this file's `if: false` removed and the body uncommented.
#   5. Release/tag creation stays human-only (deny hook + AGENTS.md); the real
#      trigger at adoption is a human-pushed tag, not workflow_dispatch.
#
# All SHAs below were re-verified against the GitHub API on 2026-07-21.
name: release

on:
  workflow_dispatch:
    inputs:
      acknowledge:
        description: "This pipeline is disabled until the public-release gate closes (see header)"
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-disabled-guard:
    name: Release pipeline (disabled)
    # Hard stop: this job never runs, and no other job exists. Flipping this
    # workflow on is a reviewed, human-only act per the header gates.
    # (actionlint's constant-expression rule is ignored for this file only, with
    # rationale, in .github/actionlint.yaml — the constant is the point.)
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Disabled
        run: echo "release pipeline is disabled until the public-release gate closes"

