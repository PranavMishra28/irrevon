name: Proposal
description: Propose a scoped feature, design, adapter, or collaboration
title: "[Proposal]: "
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete failure or user need without prescribing a solution.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope and boundaries
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and alternatives
      description: Link primary sources where relevant.
  - type: checkboxes
    id: posture
    attributes:
      label: Project posture
      options:
        - label: I understand a public proposal is not a support SLA, sales inquiry, or promise of implementation.
          required: true
