# Pre-commit hooks: secret scan on every commit (master doc §9 mandates pre-commit
# secret scanning). Install once with: pre-commit install
# Never bypass with --no-verify or SKIP=gitleaks (see AGENTS.md hard prohibitions).
# rev is pinned to the full commit SHA (not the mutable tag) — a repointed tag must not
# be able to change the scanner that runs on every commit (docs/security-policy.md).
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # v8.30.1
    hooks:
      - id: gitleaks
