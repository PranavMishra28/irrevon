# Detent â€” reference reconciliation engine (first slice).
# Stack per ADR-0013 (Python 3.13, uv, pytest+Hypothesis, psycopg 3, rfc8785 pinned);
# packaging per ADR-0018 (single `detent` package, src layout, hatchling).
# No license classifier: licensing is undecided (ADR-0014 OPEN); publishing is human-gated.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "detent"
version = "0.1.0.dev0"
description = "Reference reconciliation engine for irreversible AI-agent actions (DetentBench companion). Not yet released; no license granted (see LICENSING.md)."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # RFC 8785 (JCS) encoder â€” version-pinned per ADR-0013; guarded by the committed
    # cross-implementation conformance vectors in tests/identity/vectors/.
    "rfc8785==0.1.4",
    # JSON Schema 2020-12 validation of the trust-boundary contracts (schemas/).
    "jsonschema>=4.25",
    # Postgres driver (sync â€” single-writer POC per ADR-0013/ADR-002).
    "psycopg[binary]>=3.3.4",
]

[dependency-groups]
dev = [
    "pytest>=8.4",
    "pytest-xdist>=3.8",
    "hypothesis>=6.157",
    "mypy>=1.19",
    "types-jsonschema>=4.25",
    "ruff>=0.14",
    "import-linter>=2.5",
]

[project.scripts]
detent = "detent.cli:entrypoint"

[tool.hatch.build.targets.wheel]
packages = ["src/detent"]

# Built wheels carry the canonical trust-boundary schemas; editable/dev installs
# resolve the repo's schemas/ directory directly (see detent.contract.validation).
[tool.hatch.build.targets.wheel.force-include]
"schemas" = "detent/_schemas"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
markers = [
    "integration: requires the local Postgres from docker-compose.yml (run via `make py-test-integration`)",
]

[tool.mypy]
strict = true
python_version = "3.13"
files = ["src"]
warn_unreachable = true

[tool.ruff]
line-length = 100
target-version = "py313"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "RUF"]
# The design docs write lifecycleĂ—classification matrices and nâˆ’1 arithmetic
# with the typographic glyphs; docstrings quote them verbatim.
allowed-confusables = ["Ă—", "âˆ’", "â€“"]

# Architectural import boundaries (RFC-002 Â§14; master doc Â§12.1 row 4 static leg).
# Contracts are part of the frozen conformance surface â€” weakening one is an
# invariant-affecting change (ADR first), never a convenience edit.
[tool.importlinter]
root_package = "detent"

[[tool.importlinter.contracts]]
name = "identity is pure: no imports from modules that handle raw model arguments"
type = "forbidden"
source_modules = ["detent.identity"]
forbidden_modules = ["detent.contract"]

# ADR-006 / RFC-002 Â§14: no authority module imports advisory, direct or
# indirect. The type-level layer (ClassifierProposal rejection) is enforced via
# the marker in detent.errors, tested in tests/advisory/.
[[tool.importlinter.contracts]]
name = "advisory is never on the authority path (ADR-006)"
type = "forbidden"
source_modules = [
    "detent.identity",
    "detent.contract",
    "detent.ledger",
    "detent.gate",
    "detent.dispatcher",
    "detent.reconciler",
    "detent.recovery",
    "detent.resolution",
    "detent.sweep",
    "detent.adapters",
    "detent.api",
    "detent.cli",
]
forbidden_modules = ["detent.advisory"]
