# Irrevon gitleaks config: default rules, generic only.
# Sensitive local tripwords (e.g. identifiers that must never be committed) live in the
# untracked .tripwords file and are checked by scripts/check-integrity.sh — never here.

[extend]
useDefault = true

[allowlist]
description = "Local-only, never-committed material (gitignored)"
paths = [
  '''^\.scratch/''',
  '''^\.tripwords$''',
  # Astro's gitignored build cache: JSON-serialized copies of the site's
  # rendered repository docs. The SOURCE docs (docs/, site/src/content/) stay
  # fully scanned; the serialized cache re-shapes already-scanned committed
  # text into `"key":"value"` forms that false-positive the generic rules
  # (first hit 2026-07-21: adr-0019 content in data-store.json). The path can
  # never be committed (gitignored), so nothing real is exempted.
  '''^site/\.astro/''',
]
