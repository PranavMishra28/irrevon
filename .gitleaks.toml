# Irrevon gitleaks config: default rules, generic only.
# Sensitive local tripwords (e.g. identifiers that must never be committed) live in the
# untracked .tripwords file and are checked by scripts/check-integrity.sh — never here.

[extend]
useDefault = true

[allowlist]
description = "Local-only, never-committed material (gitignored)"
paths = [
  '''^\.scratch/''',
  '''^\.tripwords$''',
]
