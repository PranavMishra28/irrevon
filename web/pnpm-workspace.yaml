# pnpm settings only — this is a single-app tree, not a JS monorepo.
packages:
  - "."

# Supply-chain hardening per the ratified stack policy:
# - no lifecycle scripts execute, ever (every allowBuilds entry is false)
# - 7-day publish-to-installable delay
# - no provenance downgrades, no git/tarball transitive deps
# Fonts and the MSW worker are consumed as static files; esbuild's binary
# arrives via its platform optional dependency — none of these need scripts.
allowBuilds:
  "@ibm/plex-mono": false
  "@ibm/plex-sans": false
  esbuild: false
  msw: false
  unrs-resolver: false
minimumReleaseAge: 10080
trustPolicy: no-downgrade
blockExoticSubdeps: true

# Narrow, reviewed exclusions from trustPolicy only (NOT from allowBuilds or
# minimumReleaseAge). These are years-old transitive pins that predate npm
# provenance; the "downgrade" signal is an artifact of newer lines having
# attestation, not an incident. Each entry names the exact version.
# Narrow, reviewed exclusion from minimumReleaseAge only — a security patch for
# a published advisory, pulled inside the 7-day window after review (same
# discipline as site/pnpm-workspace.yaml; redundant once the window passes).
# fast-uri: advisory fixes in 3.1.4 (published 2026-07-19, canonical fastify
#   org); transitive via ajv.
minimumReleaseAgeExclude:
  - fast-uri

trustPolicyExclude:
  - semver@6.3.1
